# Watchdog LTE QMI/MBIM Configuration

# WAN interface name (default: wan)
# Uncomment and change if your WAN interface has a different name.
# iface="wan"

# LOG HEADER
logheader="watchdog_mbim"

# TEMP DIRECTORY
watchdog_directory="/tmp/watchdog"

# Boot grace period (seconds). Skips monitoring after boot to avoid interfering
# with the first WAN initialization (modem registration, NTP correction, etc.).
# The grace period is active ONLY when the daemon starts near boot
# (uptime at start < boot_grace_period). On manual restart or procd respawn
# the grace period is automatically skipped and monitoring begins immediately.
# Set to 0 to disable entirely.
boot_grace_period="600"

# Loop delay (seconds)
delay="20"

# Delay after WAN reconnect (seconds)
delay_reconnect="120"

# DEBUG
# Path of the flag file that enables verbose syslog output.
# The file is not created automatically - touch it manually to enable:
#   touch /tmp/watchdog/mbim_debug
# Remove it to disable:
#   rm -f /tmp/watchdog/mbim_debug
# Not persistent across reboots (/tmp is cleared on boot).
watchdog_debug_file="/tmp/watchdog/mbim_debug"

# Block file for temporary watchdog disable
# Touch to pause monitoring without stopping the daemon:
#   touch /tmp/watchdog/watchdog.block
# Remove to resume:
#   rm -f /tmp/watchdog/watchdog.block
watchdog_block_file="/tmp/watchdog/watchdog.block"

# OPTIONAL PRE/POST SCRIPT
# If the file exists and is executable, it is run before WAN goes down / after WAN comes up.
watchdog_predown_file="/tmp/watchdog/predown.sh"
watchdog_postup_file="/tmp/watchdog/postup.sh"

# AT command block file (used internally)
# Set by the daemon during modem recovery to prevent external AT command scripts
# from running while the modem is being restarted.
atcmd_block_file="/tmp/watchdog/atcmd_block"

# Modem device paths
# modem_device: MBIM/QMI control device. Change if your modem uses a different path.
modem_device="/dev/cdc-wdm0"

# usbreset_id: USB vendor:product ID used by usbreset for last-resort modem reset.
# Find your modem ID with: lsusb
usbreset_id="2c7c:0512"

# List of targets for connectivity checks. Only one needs to respond.
ping_targets="8.8.8.8 9.9.9.9 1.1.1.1"

# Maximum seconds to wait for a successful ping before marking connection failed.
ping_timeout_sec="300"

# Maximum seconds ping_verify() waits for connectivity after a forced MBIM disconnect
# before escalating to atcmd -C / usbreset.
# Must be <= ping_timeout_sec. Increase if the modem takes longer to re-register.
ping_verify_timeout="60"

# Lock directory used internally by ping_logger() to prevent multiple concurrent tests.
ping_lock="/tmp/watchdog/ping_lock"
